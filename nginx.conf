server {
    listen 80;
    server_name precos.liveuni.com.br;

    root /usr/share/nginx/html;
    index index.html;

    # MIME correto para modulos ESM (.mjs) — necessario para o worker do pdf.js.
    # O nginx:alpine nao mapeia .mjs por padrao; sem isto o browser recusa o modulo
    # ("Failed to fetch dynamically imported module") e a leitura de PDF quebra.
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash (JS, CSS, fontes, imagens)
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html — garante atualizacao do app
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Seguranca basica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
